version: '3.8'

services:
  app:
    build: .
    container_name: devlog-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGO_URL=mongodb://db:27017/devlog
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mongo:6-jammy
    container_name: devlog-mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data:
